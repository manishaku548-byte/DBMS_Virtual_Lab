<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER Diagram Designer - Simulation</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sim-header {
      background-color: #1565c0;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .sim-wrap { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .canvas {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      min-height: 220px;
    }
    .entity {
      padding: 12px;
      background: #e3f2fd;
      border: 2px solid #1565c0;
      margin: 10px;
      display: inline-block;
      border-radius: 8px;
      font-weight: bold;
    }
    .attribute {
      padding: 10px;
      background: #fff3cd;
      border: 2px solid orange;
      margin: 10px;
      display: inline-block;
      border-radius: 50px;
    }
    .relationship {
      padding: 12px;
      background: #d4edda;
      border: 2px solid green;
      margin: 10px;
      display: inline-block;
      transform: rotate(45deg);
      width: 100px;
      height: 100px;
      text-align: center;
      line-height: 75px;
    }
    .sim-row { margin-bottom: 10px; }
  </style>
</head>
<body>
  <header>
    <div class="menu-bar">
      <div class="menu-icon" id="menuToggle">&#9776;</div>
      <div class="logo"><img src="../../assets/logo.jpg" alt="Virtual Labs Logo" /></div>
    </div>
    <div class="orange-line"></div>
  </header>

  <div class="sim-header">Experiment 3: ER Diagram Designer &mdash; Simulation</div>

  <div class="sim-wrap">
    <div class="section">
      <h2>ER Diagram Simulator</h2>

      <div class="sim-row">
        <input type="text" id="entityInput" placeholder="Entity Name">
        <button onclick="addEntity()">Add Entity</button>
      </div>

      <div class="sim-row">
        <input type="text" id="attributeInput" placeholder="Attribute Name">
        <button onclick="addAttribute()">Add Attribute</button>
      </div>

      <div class="sim-row">
        <input type="text" id="relationInput" placeholder="Relationship Name">
        <button onclick="addRelationship()">Add Relationship</button>
      </div>

      <div id="canvas" class="canvas">
        <h3>ER Diagram Workspace</h3>
      </div>
    </div>
  </div>

  <!-- Modal Menu -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../../assets/logo.jpg" alt="Logo" class="modal-logo"/>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <ul class="modal-menu">
        <li><a href="AO.html">Aim</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><a href="quiz.html">Pretest</a></li>
        <li><a href="pro.html">Procedure</a></li>
        <li><a href="sim.html" class="active">Simulation</a></li>
        <li><a href="postt.html">Posttest</a></li>
        <li><a href="ref.html">References</a></li>
        <li><a href="feed2.html">Feedback</a></li>
      </ul>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script>
    function addEntity() {
      let value = document.getElementById("entityInput").value;
      if (value === "") return;
      document.getElementById("canvas").innerHTML += `<div class="entity">${value}</div>`;
      document.getElementById("entityInput").value = "";
    }

    function addAttribute() {
      let value = document.getElementById("attributeInput").value;
      if (value === "") return;
      document.getElementById("canvas").innerHTML += `<div class="attribute">${value}</div>`;
      document.getElementById("attributeInput").value = "";
    }

    function addRelationship() {
      let value = document.getElementById("relationInput").value;
      if (value === "") return;
      document.getElementById("canvas").innerHTML += `<div class="relationship"><span style="display:inline-block;transform:rotate(-45deg);">${value}</span></div>`;
      document.getElementById("relationInput").value = "";
    }
  </script>
</body>
</html>
