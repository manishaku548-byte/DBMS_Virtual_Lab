<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Schema Architecture - Simulation</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sim-header {
      background-color: #1565c0;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .sim-wrap { max-width: 700px; margin: 30px auto; padding: 0 20px; }
    .schema-box {
      padding: 22px;
      margin: 16px 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      transition: .3s;
    }
    .schema-box:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,.15); }
    .external { background: #e3f2fd; }
    .conceptual { background: #fff3cd; }
    .internal { background: #d4edda; }
    .schema-info {
      margin-top: 16px;
      padding: 18px;
      background: #f8f9fa;
      border-left: 5px solid #1565c0;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="menu-bar">
      <div class="menu-icon" id="menuToggle">&#9776;</div>
      <div class="logo"><img src="../../assets/logo.jpg" alt="Virtual Labs Logo" /></div>
    </div>
    <div class="orange-line"></div>
  </header>

  <div class="sim-header">Experiment 2: Three Schema Architecture &mdash; Simulation</div>

  <div class="sim-wrap">
    <div class="section">
      <h2>Interactive Simulator</h2>
      <p>Click on any schema level to learn about it.</p>

      <div class="schema-box external" onclick="showInfo('external')">External Schema</div>
      <div class="schema-box conceptual" onclick="showInfo('conceptual')">Conceptual Schema</div>
      <div class="schema-box internal" onclick="showInfo('internal')">Internal Schema</div>

      <div id="schemaInfo" class="schema-info"></div>
    </div>
  </div>

  <!-- Modal Menu -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../../assets/logo.jpg" alt="Logo" class="modal-logo"/>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <ul class="modal-menu">
        <li><a href="AO.html">Aim</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><a href="quiz.html">Pretest</a></li>
        <li><a href="pro.html">Procedure</a></li>
        <li><a href="sim.html" class="active">Simulation</a></li>
        <li><a href="postt.html">Posttest</a></li>
        <li><a href="ref.html">References</a></li>
        <li><a href="feed2.html">Feedback</a></li>
      </ul>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script>
    function showInfo(type) {
      const info = document.getElementById("schemaInfo");
      info.style.display = "block";

      if (type === "external") {
        info.innerHTML = "<h3>External Schema</h3><p>User specific views of database.</p>";
      } else if (type === "conceptual") {
        info.innerHTML = "<h3>Conceptual Schema</h3><p>Logical structure of complete database.</p>";
      } else {
        info.innerHTML = "<h3>Internal Schema</h3><p>Physical storage representation of data.</p>";
      }
    }
  </script>
</body>
</html>
