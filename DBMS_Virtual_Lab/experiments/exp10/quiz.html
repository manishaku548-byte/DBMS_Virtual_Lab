  <main class="content">
    <h1 align="center">Experiment 10: Transactions & Concurrency</h1>
  </main>

  <div class="section">
    <p><strong>Which property ensures a transaction is completed fully or not at all?</strong></p>
      <label><input type="radio" name="q1" value="Atomicity"> Atomicity</label><br>
      <label><input type="radio" name="q1" value="Isolation"> Isolation</label><br>
    <button onclick="checkPretest()">Submit</button>
    <p id="quizResult" class="result"></p>
  </div>

  <script>
    function checkPretest() {
      const answer = document.querySelector('input[name="q1"]:checked');
      const resultEl = document.getElementById('quizResult');
      if (!answer) {
        alert("Select an answer");
        return;
      }
      if (answer.value === "Atomicity") {
        resultEl.style.color = "green";
        resultEl.innerHTML = "Correct Answer";
      } else {
        resultEl.style.color = "red";
        resultEl.innerHTML = "Wrong Answer";
      }
    }
  </script>
