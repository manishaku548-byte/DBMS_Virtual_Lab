<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions &amp; Concurrency - Simulation</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sim-header {
      background-color: #1565c0;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .sim-wrap { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .transaction-box {
      padding: 15px;
      margin: 10px 0;
      background: #e3f2fd;
      border-left: 5px solid #1565c0;
    }
    .output {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      min-height: 110px;
    }
  </style>
</head>
<body>
  <header>
    <div class="menu-bar">
      <div class="menu-icon" id="menuToggle">&#9776;</div>
      <div class="logo"><img src="../../assets/logo.jpg" alt="Virtual Labs Logo" /></div>
    </div>
    <div class="orange-line"></div>
  </header>

  <div class="sim-header">Experiment 10: Transactions &amp; Concurrency &mdash; Simulation</div>

  <div class="sim-wrap">
    <div class="section">
      <h2>Transaction Simulator</h2>

      <div class="transaction-box">Transaction T1:<br>Read(A)<br>Write(A)</div>
      <div class="transaction-box">Transaction T2:<br>Read(A)<br>Write(A)</div>

      <button onclick="serialSchedule()">Serial Schedule</button>
      <button onclick="concurrentSchedule()">Concurrent Schedule</button>
      <button onclick="deadlockDemo()">Deadlock Demo</button>

      <div id="output" class="output">Select an operation</div>
    </div>
  </div>

  <!-- Modal Menu -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../../assets/logo.jpg" alt="Logo" class="modal-logo"/>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <ul class="modal-menu">
        <li><a href="AO.html">Aim</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><a href="quiz.html">Pretest</a></li>
        <li><a href="pro.html">Procedure</a></li>
        <li><a href="sim.html" class="active">Simulation</a></li>
        <li><a href="postt.html">Posttest</a></li>
        <li><a href="ref.html">References</a></li>
        <li><a href="feed2.html">Feedback</a></li>
      </ul>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script>
    function serialSchedule() {
      document.getElementById("output").innerHTML = `
<h3>Serial Schedule</h3>
T1 Executes Completely
<br><br>
Then
<br><br>
T2 Executes Completely
<br><br>
Result: No Conflict`;
    }

    function concurrentSchedule() {
      document.getElementById("output").innerHTML = `
<h3>Concurrent Schedule</h3>
T1 Read(A)
<br>
T2 Read(A)
<br>
T1 Write(A)
<br>
T2 Write(A)
<br><br>
Result: Possible Conflict`;
    }

    function deadlockDemo() {
      document.getElementById("output").innerHTML = `
<h3>Deadlock Example</h3>
T1 Holds Lock A
<br>
Waiting for Lock B
<br><br>
T2 Holds Lock B
<br>
Waiting for Lock A
<br><br>
Result: Deadlock Occurred`;
    }
  </script>
</body>
</html>
