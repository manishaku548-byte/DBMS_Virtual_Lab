<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER to Relational Mapping - Simulation</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sim-header {
      background-color: #1565c0;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .sim-wrap { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .output {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      min-height: 130px;
    }
  </style>
</head>
<body>
  <header>
    <div class="menu-bar">
      <div class="menu-icon" id="menuToggle">&#9776;</div>
      <div class="logo"><img src="../../assets/logo.jpg" alt="Virtual Labs Logo" /></div>
    </div>
    <div class="orange-line"></div>
  </header>

  <div class="sim-header">Experiment 4: ER to Relational Mapping &mdash; Simulation</div>

  <div class="sim-wrap">
    <div class="section">
      <h2>Interactive Mapping Simulator</h2>

      <input type="text" id="entity" placeholder="Entity Name">
      <input type="text" id="attributes" placeholder="Attributes (comma separated)">
      <button onclick="convertER()">Convert</button>

      <div id="output" class="output">Generated Table Appears Here</div>
    </div>
  </div>

  <!-- Modal Menu -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../../assets/logo.jpg" alt="Logo" class="modal-logo"/>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <ul class="modal-menu">
        <li><a href="AO.html">Aim</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><a href="quiz.html">Pretest</a></li>
        <li><a href="pro.html">Procedure</a></li>
        <li><a href="sim.html" class="active">Simulation</a></li>
        <li><a href="postt.html">Posttest</a></li>
        <li><a href="ref.html">References</a></li>
        <li><a href="feed2.html">Feedback</a></li>
      </ul>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script>
    function convertER() {
      let entity = document.getElementById("entity").value;
      let attributes = document.getElementById("attributes").value;

      if (entity === "" || attributes === "") {
        alert("Enter Entity and Attributes");
        return;
      }

      let cols = attributes.split(",");
      let html = "<h3>Generated Relation</h3>";
      html += "<table>";
      html += "<tr>";
      cols.forEach(col => {
        html += "<th>" + col.trim() + "</th>";
      });
      html += "</tr>";
      html += "</table>";
      html += "<br><b>Relation:</b> " + entity + "(" + attributes + ")";

      document.getElementById("output").innerHTML = html;
    }
  </script>
</body>
</html>
