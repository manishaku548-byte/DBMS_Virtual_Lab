<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Functional Dependency Analyzer - Simulation</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sim-header {
      background-color: #1565c0;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .sim-wrap { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .sim-wrap input[type="text"] { width: 90%; }
    .output {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      min-height: 100px;
    }
  </style>
</head>
<body>
  <header>
    <div class="menu-bar">
      <div class="menu-icon" id="menuToggle">&#9776;</div>
      <div class="logo"><img src="../../assets/logo.jpg" alt="Virtual Labs Logo" /></div>
    </div>
    <div class="orange-line"></div>
  </header>

  <div class="sim-header">Experiment 8: Functional Dependency Analyzer &mdash; Simulation</div>

  <div class="sim-wrap">
    <div class="section">
      <h2>FD Simulator</h2>

      <input type="text" id="fdInput" placeholder="Example: A->B, B->C">
      <br>
      <input type="text" id="attrInput" placeholder="Attributes: A,B,C">
      <br>
      <button onclick="analyzeFD()">Analyze</button>

      <div id="output" class="output">Result appears here</div>
    </div>
  </div>

  <!-- Modal Menu -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../../assets/logo.jpg" alt="Logo" class="modal-logo"/>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <ul class="modal-menu">
        <li><a href="AO.html">Aim</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><a href="quiz.html">Pretest</a></li>
        <li><a href="pro.html">Procedure</a></li>
        <li><a href="sim.html" class="active">Simulation</a></li>
        <li><a href="postt.html">Posttest</a></li>
        <li><a href="ref.html">References</a></li>
        <li><a href="feed2.html">Feedback</a></li>
      </ul>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script>
    function analyzeFD() {
      let fd = document.getElementById("fdInput").value;
      let attr = document.getElementById("attrInput").value;

      if (fd === "" || attr === "") {
        alert("Enter FD and Attributes");
        return;
      }

      let attrs = attr.split(",");
      let candidateKey = attrs[0].trim();

      document.getElementById("output").innerHTML = `
<h3>Analysis Result</h3>
<p>Functional Dependencies: ${fd}</p>
<p>Attributes: ${attr}</p>
<p>Candidate Key (Demo): <b>${candidateKey}</b></p>
<p>Closure: <b>${candidateKey}+ = ${attr}</b></p>`;
    }
  </script>
</body>
</html>
