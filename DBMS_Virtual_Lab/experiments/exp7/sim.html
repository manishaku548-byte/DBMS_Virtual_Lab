<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Join Visualizer - Simulation</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sim-header {
      background-color: #1565c0;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .sim-wrap { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .output {
      margin-top: 20px;
      background: #f5f5f5;
      padding: 20px;
      border-radius: 10px;
      min-height: 130px;
    }
  </style>
</head>
<body>
  <header>
    <div class="menu-bar">
      <div class="menu-icon" id="menuToggle">&#9776;</div>
      <div class="logo"><img src="../../assets/logo.jpg" alt="Virtual Labs Logo" /></div>
    </div>
    <div class="orange-line"></div>
  </header>

  <div class="sim-header">Experiment 7: SQL Join Visualizer &mdash; Simulation</div>

  <div class="sim-wrap">
    <div class="section">
      <h2>EMPLOYEE Table</h2>
      <table>
        <tr><th>EmpID</th><th>Name</th><th>DeptID</th></tr>
        <tr><td>1</td><td>Rahul</td><td>10</td></tr>
        <tr><td>2</td><td>Priya</td><td>20</td></tr>
        <tr><td>3</td><td>Amit</td><td>30</td></tr>
      </table>
    </div>

    <div class="section">
      <h2>DEPARTMENT Table</h2>
      <table>
        <tr><th>DeptID</th><th>Department</th></tr>
        <tr><td>10</td><td>CSE</td></tr>
        <tr><td>20</td><td>IT</td></tr>
        <tr><td>40</td><td>ECE</td></tr>
      </table>
    </div>

    <div class="section">
      <h2>Join Simulator</h2>
      <select id="joinType">
        <option value="inner">INNER JOIN</option>
        <option value="left">LEFT JOIN</option>
        <option value="right">RIGHT JOIN</option>
        <option value="full">FULL JOIN</option>
      </select>

      <button onclick="showJoin()">Visualize</button>

      <div id="output" class="output">Select a Join Type</div>
    </div>
  </div>

  <!-- Modal Menu -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../../assets/logo.jpg" alt="Logo" class="modal-logo"/>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <ul class="modal-menu">
        <li><a href="AO.html">Aim</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><a href="quiz.html">Pretest</a></li>
        <li><a href="pro.html">Procedure</a></li>
        <li><a href="sim.html" class="active">Simulation</a></li>
        <li><a href="postt.html">Posttest</a></li>
        <li><a href="ref.html">References</a></li>
        <li><a href="feed2.html">Feedback</a></li>
      </ul>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script>
    function showJoin() {
      let type = document.getElementById("joinType").value;
      let output = document.getElementById("output");

      if (type === "inner") {
        output.innerHTML = `
<h3>INNER JOIN Result</h3>
<table>
<tr><th>EmpID</th><th>Name</th><th>Department</th></tr>
<tr><td>1</td><td>Rahul</td><td>CSE</td></tr>
<tr><td>2</td><td>Priya</td><td>IT</td></tr>
</table>`;
      } else if (type === "left") {
        output.innerHTML = `
<h3>LEFT JOIN Result</h3>
<table>
<tr><th>EmpID</th><th>Name</th><th>Department</th></tr>
<tr><td>1</td><td>Rahul</td><td>CSE</td></tr>
<tr><td>2</td><td>Priya</td><td>IT</td></tr>
<tr><td>3</td><td>Amit</td><td>NULL</td></tr>
</table>`;
      } else if (type === "right") {
        output.innerHTML = `
<h3>RIGHT JOIN Result</h3>
<table>
<tr><th>EmpID</th><th>Name</th><th>Department</th></tr>
<tr><td>1</td><td>Rahul</td><td>CSE</td></tr>
<tr><td>2</td><td>Priya</td><td>IT</td></tr>
<tr><td>NULL</td><td>NULL</td><td>ECE</td></tr>
</table>`;
      } else {
        output.innerHTML = `
<h3>FULL JOIN Result</h3>
<table>
<tr><th>EmpID</th><th>Name</th><th>Department</th></tr>
<tr><td>1</td><td>Rahul</td><td>CSE</td></tr>
<tr><td>2</td><td>Priya</td><td>IT</td></tr>
<tr><td>3</td><td>Amit</td><td>NULL</td></tr>
<tr><td>NULL</td><td>NULL</td><td>ECE</td></tr>
</table>`;
      }
    }
  </script>
</body>
</html>
