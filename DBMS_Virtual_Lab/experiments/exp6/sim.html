<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Query Laboratory - Simulation</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .sim-header {
      background-color: #1565c0;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .sim-wrap { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    textarea#query {
      width: 100%;
      height: 130px;
      font-family: monospace;
      font-size: 16px;
    }
    .output {
      margin-top: 20px;
      background: #f5f5f5;
      padding: 20px;
      border-radius: 10px;
      min-height: 130px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="menu-bar">
      <div class="menu-icon" id="menuToggle">&#9776;</div>
      <div class="logo"><img src="../../assets/logo.jpg" alt="Virtual Labs Logo" /></div>
    </div>
    <div class="orange-line"></div>
  </header>

  <div class="sim-header">Experiment 6: SQL Query Laboratory &mdash; Simulation</div>

  <div class="sim-wrap">
    <div class="section">
      <h2>Sample Table: STUDENT</h2>
      <table>
        <tr><th>ID</th><th>Name</th><th>Branch</th></tr>
        <tr><td>101</td><td>Rahul</td><td>CSE</td></tr>
        <tr><td>102</td><td>Priya</td><td>IT</td></tr>
        <tr><td>103</td><td>Amit</td><td>CSE</td></tr>
      </table>
    </div>

    <div class="section">
      <h2>SQL Simulator</h2>
      <textarea id="query">SELECT * FROM STUDENT;</textarea>
      <br>
      <button onclick="runQuery()">Execute Query</button>
      <div id="output" class="output">Result appears here</div>
    </div>
  </div>

  <!-- Modal Menu -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../../assets/logo.jpg" alt="Logo" class="modal-logo"/>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <ul class="modal-menu">
        <li><a href="AO.html">Aim</a></li>
        <li><a href="theory.html">Theory</a></li>
        <li><a href="quiz.html">Pretest</a></li>
        <li><a href="pro.html">Procedure</a></li>
        <li><a href="sim.html" class="active">Simulation</a></li>
        <li><a href="postt.html">Posttest</a></li>
        <li><a href="ref.html">References</a></li>
        <li><a href="feed2.html">Feedback</a></li>
      </ul>
    </div>
  </div>

  <script src="../../js/script.js"></script>
  <script>
    function runQuery() {
      let query = document.getElementById("query").value.toUpperCase().trim();
      let output = document.getElementById("output");

      if (query.includes("SELECT *")) {
        output.innerHTML = `
<table>
<tr><th>ID</th><th>Name</th><th>Branch</th></tr>
<tr><td>101</td><td>Rahul</td><td>CSE</td></tr>
<tr><td>102</td><td>Priya</td><td>IT</td></tr>
<tr><td>103</td><td>Amit</td><td>CSE</td></tr>
</table>`;
      } else if (query.includes("WHERE BRANCH='CSE'")) {
        output.innerHTML = `
<table>
<tr><th>ID</th><th>Name</th><th>Branch</th></tr>
<tr><td>101</td><td>Rahul</td><td>CSE</td></tr>
<tr><td>103</td><td>Amit</td><td>CSE</td></tr>
</table>`;
      } else {
        output.innerHTML = "Query not supported in demo simulator.";
      }
    }
  </script>
</body>
</html>
